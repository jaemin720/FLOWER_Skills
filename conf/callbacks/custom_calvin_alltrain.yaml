ema:
  _target_: flower.callbacks.ema.EMA
  decay: 0.999
  start_step: 0
  save_ema_weights_in_callback_state: True
  evaluate_ema_weights_instead: True
  power: 0.6666666666666666
  inv_gamma: 1.0
  min_value: 0.0
  max_value: 0.9999

checkpoint:
  _target_: pytorch_lightning.callbacks.ModelCheckpoint
  save_top_k: -1
  save_last: True
  verbose: True
  monitor: train/action_loss
  mode: min
  dirpath: saved_models
  filename: '{epoch:02d}_{train/action_loss:.4f}'
  every_n_epochs: 1
