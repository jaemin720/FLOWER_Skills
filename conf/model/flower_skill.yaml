# FLOWERVLA Configuration
_target_: flower.models.flower.FLOWERVLA
_recursive_: false

# VLM Configuration
vlm_path: microsoft/Florence-2-large
freeze_florence: False
freeze_vision_tower: False
vlm_prompt_style: default
token_dropout: 0.1  # Added token dropout parameter

# Model Structure
multistep: ${multistep}
num_sampling_steps: 4
lowdim_obs_dim: 13 # ft 있으면 13 / 없으면 7
action_dim: 7
act_window_size: ${act_seq_len}

# QueST skill conditioning. Keep disabled until a trained QueST stage-0
# checkpoint is available.
use_quest_skill: false
quest_repo_path: /home/jack/quest_practice/QueST
quest_autoencoder_ckpt: null
quest_skill_label_path: null
quest_skill_loss_weight: 1.0
quest_skill_conditioning: true
quest_skill_condition_source: teacher
quest_skill_block_size: 32
quest_downsample_factor: 4
quest_vq_type: fsq
quest_fsq_level: null
quest_codebook_size: 1024
quest_codebook_dim: 512
quest_encoder_dim: 256
quest_decoder_dim: 256
quest_attn_pdrop: 0.1
quest_use_causal_encoder: true
quest_use_causal_decoder: true
quest_encoder_heads: 4
quest_encoder_layers: 2
quest_decoder_heads: 4
quest_decoder_layers: 4

# pretraining stuff
load_pretrained: True
pretrained_model_path: /home/jack/practice/flower_vla_pret/flower_pretrained/360000_model_weights.pt
# /home/hk-project-sustainebot/ft4740/code/flower_vla/logs/runs/2025-02-19/11-15-41/200000_model_weights.pt
# /home/hk-project-sustainebot/ft4740/code/flower_vla_policy/logs/runs/2025-02-05/10-17-02/360000_model_weights.pt joint + delta pret
# Model flags
use_second_view: True
second_view_key: image_wrist
action_type_adaln: True
use_causal_attention: true
use_cross_attn: True
use_adaln_cond: false
use_readout_token: false
use_proprio: True
return_act_chunk: false

# DiT Configuration
sampling_type: uniform
dit_dim: 1024
n_heads: 16
n_layers: 12
attn_pdrop: 0.1
resid_pdrop: 0.1
mlp_pdrop: 0.1

# RoPE Configuration
use_rope: true
use_nope: false
query_seq_len: 100
rope_theta: 32.0

# Optimizer Configuration
optimizer_type: adamw

optimizer:
  _target_: torch.optim.AdamW
  transformer_weight_decay: 0.05
  learning_rate: 2e-5
  betas: [0.9, 0.95]

# Learning Rate Scheduler
lr_scheduler:
  lr_scheduler:
    init_lr: 2e-5
    init_lr_scale: 0.1
    final_lr_scale: 0.5
    total_steps: 50000
    phase_ratio: "(0.05, 0.1, 0.85)"
    lr: 2e-5
